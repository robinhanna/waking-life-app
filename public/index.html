<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Waking Life 2026</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0e0d10" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Waking Life" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="app.css" />
</head>
<body>
  <header id="topbar">
    <div class="brand">Waking Life</div>
    <div class="topbar-actions">
      <button id="btn-add"   class="icon-btn" type="button" aria-label="Add event">＋</button>
      <button id="btn-share" class="icon-btn" type="button" aria-label="Share">⇪</button>

  <main id="view" aria-live="polite">
    <p class="loading">Loading…</p>

  <nav id="tabs" role="tablist" aria-label="Views">
    <a href="#timetable"  data-tab="timetable"  role="tab"><span class="ico">▤</span><span class="lbl">Timetable</span></a>
    <a href="#lineup"     data-tab="lineup"     role="tab"><span class="ico">≣</span><span class="lbl">Lineup</span></a>
    <a href="#favourites" data-tab="favourites" role="tab"><span class="ico">♥</span><span class="lbl">Favourites</span></a>
    <a href="#info"       data-tab="info"       role="tab"><span class="ico">ⓘ</span><span class="lbl">Info</span></a>
  </nav>

  <div id="modal-root" aria-hidden="true"></div>

  <script type="module" src="app.js"></script>

</html>
